[target.'cfg(target_arch="x86_64")']
# x86-64-v2 lacks AVX2 which simd-minimizers needs; x86-64-v4 (AVX-512) hurts portability
rustflags = ["-C", "target-cpu=x86-64-v3"]

[target.'cfg(all(target_arch="aarch64", target_os="macos"))']
# Portable Apple-silicon baseline; negligible practical difference M1->M4
rustflags = ["-C", "target-cpu=apple-m1"]
